<body>
  <!--
    Tema flash'ını (FOUC) önlemek için pre-paint script.
    ThemeService ile AYNI kuralı uygular: localStorage('ui-theme') > sistem
    tercihi > dark. body.light-theme/dark-theme + html.dark sınıflarını
    Angular bootstrap'inden ÖNCE ekler; böylece saklanan açık tema önce koyu
    olarak çakıp sonra düzelmez.

    Font Awesome CDN'den değil, styles.scss içindeki self-host import'tan
    yüklenir (fabrika içi ağlarda harici CDN'e bağımlılık olmasın).
  -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('ui-theme');
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        var isLight = theme === 'light';
        document.body.classList.add(isLight ? 'light-theme' : 'dark-theme');
        if (!isLight) document.documentElement.classList.add('dark');
      } catch (e) { /* gizli mod / SSR — :root koyu varsayılanı geçerli */ }
    })();
  </script>
