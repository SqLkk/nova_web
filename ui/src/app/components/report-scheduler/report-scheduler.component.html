<!-- Report Scheduler Modal (Dedicated scheduler popped from list actions) -->
<div *ngIf="isVisible"
     class="fixed inset-0 z-[99999] flex items-center justify-center bg-black/60 backdrop-blur-sm transition-all duration-300">
  <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-600/50 shadow-2xl p-6 max-w-lg w-full mx-4 animate-fade-in-down select-none text-slate-800 dark:text-white">
    
    <!-- Modal Header -->
    <div class="flex items-center justify-between mb-4 pb-3 border-b border-slate-200 dark:border-slate-700/50">
      <div class="flex items-center gap-3">
        <div class="p-3 bg-violet-500/15 rounded-xl border border-violet-500/25">
          <i class="fas fa-clock text-violet-400 text-lg animate-pulse"></i>
        </div>
        <div>
          <h3 class="text-base font-bold text-slate-800 dark:text-white">Configure Report Schedule</h3>
          <p class="text-[10px] text-slate-500 dark:text-slate-400">Automate and recurring-run report: <span class="text-violet-400 font-semibold">{{ report?.name }}</span></p>
        </div>
      </div>
      <button (click)="closeReportScheduler()" class="p-1.5 text-slate-400 hover:text-slate-800 dark:hover:text-white transition-colors">
        <i class="fas fa-times text-sm"></i>
      </button>
    </div>

    <!-- Loading State inside Modal -->
    <div *ngIf="isLoading" class="flex flex-col items-center justify-center py-12">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-violet-500"></div>
      <p class="text-xs text-slate-500 dark:text-slate-400 mt-2">Loading schedule settings...</p>
    </div>

    <!-- Modal Body -->
    <div *ngIf="!isLoading" class="space-y-4 max-h-[400px] overflow-y-auto pr-1">
      
      <!-- Enabled Toggle -->
      <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-900/30 rounded-xl border border-slate-200 dark:border-slate-700/40">
        <div class="flex items-center gap-2">
          <i class="fas fa-power-off" [ngClass]="schedulerEnabled ? 'text-emerald-400' : 'text-slate-500'"></i>
          <span class="text-xs text-slate-700 dark:text-slate-200 font-semibold">Enable Automation / Schedule</span>
        </div>
        <button type="button" (click)="schedulerEnabled = !schedulerEnabled"
          class="relative inline-flex h-6 w-12 items-center rounded-full transition-colors duration-300"
          [ngClass]="schedulerEnabled ? 'bg-violet-600' : 'bg-slate-600'">
          <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-300 shadow"
                [ngClass]="schedulerEnabled ? 'translate-x-7' : 'translate-x-1'"></span>
        </button>
      </div>

      <div *ngIf="schedulerEnabled" class="space-y-4 animate-fade-in-grow">
        <!-- Schedule Type Select -->
        <div class="space-y-1.5">
          <label class="block text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold tracking-wider">Schedule Recurrence</label>
          <div class="grid grid-cols-5 gap-1">
            <button *ngFor="let type of scheduleTypes" type="button"
              (click)="schedulerType = type.value"
              class="p-2 rounded-lg border text-[10px] font-bold transition-all text-center"
              [ngClass]="schedulerType === type.value
                ? 'border-violet-500 bg-violet-500/20 text-violet-700 dark:text-white shadow-lg'
                : 'border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/30 text-slate-600 dark:text-slate-400 hover:border-slate-400 dark:hover:border-slate-500'">
              {{ type.label }}
            </button>
          </div>
        </div>

        <!-- Configuration per Type -->
        
        <!-- Daily Configuration -->
        <div *ngIf="schedulerType === 'daily'" class="p-3.5 bg-slate-50 dark:bg-slate-900/40 rounded-xl border border-slate-200 dark:border-slate-700/30 space-y-2">
          <label class="block text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase">Trigger Time (Every Day)</label>
          <input type="time" [(ngModel)]="schedulerTime"
            class="w-full bg-white dark:bg-slate-900/60 text-slate-800 dark:text-white rounded-lg border border-slate-200 dark:border-slate-600/50 py-2 px-3 text-xs focus:outline-none focus:ring-1 focus:ring-violet-500 date-input-dark">
        </div>

        <!-- Weekly Configuration -->
        <div *ngIf="schedulerType === 'weekly'" class="space-y-3 p-3.5 bg-slate-50 dark:bg-slate-900/40 rounded-xl border border-slate-200 dark:border-slate-700/30">
          <div>
            <label class="block text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase mb-1.5">Select Run Days</label>
            <div class="grid grid-cols-7 gap-1">
              <button *ngFor="let day of weekDays" type="button" (click)="toggleWeekDay(day.value)"
                class="aspect-square rounded-lg border text-[10px] font-bold transition-all flex items-center justify-center"
                [ngClass]="schedulerDays.includes(day.value) ? 'border-violet-500 bg-violet-500/30 text-violet-700 dark:text-white shadow' : 'border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/30 text-slate-600 dark:text-slate-400 hover:border-slate-400 dark:hover:border-slate-500'">
                {{ day.label }}
              </button>
            </div>
          </div>
          <div>
            <label class="block text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase">Trigger Time</label>
            <input type="time" [(ngModel)]="schedulerTime"
              class="w-full bg-white dark:bg-slate-900/60 text-slate-800 dark:text-white rounded-lg border border-slate-200 dark:border-slate-600/50 py-2 px-3 text-xs focus:outline-none focus:ring-1 focus:ring-violet-500 date-input-dark">
          </div>
        </div>

        <!-- Monthly Configuration -->
        <div *ngIf="schedulerType === 'monthly'" class="p-3.5 bg-slate-50 dark:bg-slate-900/40 rounded-xl border border-slate-200 dark:border-slate-700/30 grid grid-cols-2 gap-2">
          <div>
            <label class="block text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase mb-1">Day of Month</label>
            <input type="number" min="1" max="31" [(ngModel)]="schedulerDayOfMonth"
              class="w-full bg-white dark:bg-slate-900/60 text-slate-800 dark:text-white rounded-lg border border-slate-200 dark:border-slate-600/50 py-2 px-3 text-xs focus:outline-none focus:ring-1 focus:ring-violet-500">
          </div>
          <div>
            <label class="block text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase mb-1">Trigger Time</label>
            <input type="time" [(ngModel)]="schedulerTime"
              class="w-full bg-white dark:bg-slate-900/60 text-slate-800 dark:text-white rounded-lg border border-slate-200 dark:border-slate-600/50 py-2 px-3 text-xs focus:outline-none focus:ring-1 focus:ring-violet-500 date-input-dark">
          </div>
        </div>

        <!-- Interval Configuration -->
        <div *ngIf="schedulerType === 'interval'" class="p-3.5 bg-slate-50 dark:bg-slate-900/40 rounded-xl border border-slate-200 dark:border-slate-700/30 space-y-2">
          <label class="block text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase">Interval Period</label>
          <div class="grid grid-cols-2 gap-2">
            <input type="number" min="1" [(ngModel)]="schedulerIntervalValue" placeholder="Value"
              class="bg-white dark:bg-slate-900/60 text-slate-800 dark:text-white rounded-lg border border-slate-200 dark:border-slate-600/50 py-2 px-3 text-xs focus:outline-none focus:ring-1 focus:ring-violet-500">
            <select [(ngModel)]="schedulerIntervalUnit"
              class="bg-white dark:bg-slate-900/60 text-slate-800 dark:text-white rounded-lg border border-slate-200 dark:border-slate-600/50 py-2 px-3 text-xs focus:outline-none focus:ring-1 focus:ring-violet-500 appearance-none">
              <option *ngFor="let unit of intervalUnits" [value]="unit.value" class="bg-white text-slate-800 dark:bg-slate-800 dark:text-white">{{ unit.label }}</option>
            </select>
          </div>
        </div>

        <!-- Once Configuration -->
        <div *ngIf="schedulerType === 'once'" class="p-3.5 bg-slate-50 dark:bg-slate-900/40 rounded-xl border border-slate-200 dark:border-slate-700/30 space-y-2">
          <label class="block text-[10px] text-slate-500 dark:text-slate-400 font-bold uppercase">One-Time Execution Date/Time</label>
          <input type="datetime-local" [(ngModel)]="schedulerOnceDateTime"
            class="w-full bg-white dark:bg-slate-900/60 text-slate-800 dark:text-white rounded-lg border border-slate-200 dark:border-slate-600/50 py-2 px-3 text-sm focus:outline-none focus:ring-1 focus:ring-violet-500 date-input-dark">
        </div>

        <!-- Timezone Configuration -->
        <div class="space-y-1">
          <label class="block text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold tracking-wider">Timezone</label>
          <select [(ngModel)]="schedulerTimezone"
            class="w-full bg-white dark:bg-slate-900/60 text-slate-800 dark:text-white rounded-lg border border-slate-200 dark:border-slate-600/50 py-2 px-3 text-xs focus:outline-none focus:ring-1 focus:ring-violet-500">
            <option [value]="systemTimezone" class="bg-white text-slate-800 dark:bg-slate-800 dark:text-white">System Timezone ({{ systemTimezone }})</option>
            <option value="UTC" class="bg-white text-slate-800 dark:bg-slate-800 dark:text-white">Coordinated Universal Time (UTC)</option>
          </select>
        </div>
      </div>

      <div *ngIf="!schedulerEnabled" class="text-center py-6 bg-slate-50 dark:bg-slate-900/20 rounded-xl border border-dashed border-slate-200 dark:border-slate-700/50">
        <p class="text-slate-500 dark:text-slate-400 text-xs font-semibold">Recurring schedule is disabled. Trigger report manually using the run button.</p>
      </div>
    </div>

    <!-- Modal Footer -->
    <div *ngIf="!isLoading" class="flex justify-end gap-2 pt-4 border-t border-slate-200 dark:border-slate-700/50 mt-4">
      <button (click)="closeReportScheduler()" 
              class="px-4 py-2 rounded-lg text-xs bg-slate-100 dark:bg-slate-700/50 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 hover:text-slate-800 dark:hover:text-white transition-colors font-medium">
        Cancel
      </button>
      <button (click)="saveReportSchedule()" 
              class="px-4 py-2 rounded-lg text-xs bg-violet-600 hover:bg-violet-500 text-white font-semibold shadow-md shadow-violet-950/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center gap-1.5">
        <i class="fas fa-save text-[10px]"></i> Save Schedule
      </button>
    </div>

  </div>
</div>
